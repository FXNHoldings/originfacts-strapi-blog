# Production hosting for originfacts.com + www.originfacts.com.
#
# Both names proxy to the same originfacts-com-dev container at 127.0.0.1:3000
# (matches the originfacts.fxnstudio.com staging config). The bare domain is
# 301'd to the www subdomain so we keep one canonical host for SEO + cookies.
#
# Bring-up sequence:
#   1. This file lives on the server with port 80 only (no TLS yet).
#   2. User updates DNS at the registrar:
#        originfacts.com         A    146.0.42.20
#        www.originfacts.com     A    146.0.42.20
#      (or use a CNAME for www if that's the registrar style).
#   3. Wait for DNS to propagate (5 min – 48 h depending on TTL).
#   4. Run:  certbot --nginx -d originfacts.com -d www.originfacts.com
#      Certbot will rewrite this file to add the listen 443 ssl lines and the
#      managed cert paths automatically.

server {
    server_name originfacts.com www.originfacts.com;

    client_max_body_size 64M;

    # Canonical host = www. Bare domain → www permanent redirect.
    # Certbot will move both names onto HTTPS so this rule still applies post-TLS.
    if ($host = originfacts.com) {
        return 301 https://www.originfacts.com$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    listen [::]:443 ssl ipv6only=on; # managed by Certbot
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/originfacts.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/originfacts.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}


server {
    if ($host = www.originfacts.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = originfacts.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    listen [::]:80;
    server_name originfacts.com www.originfacts.com;
    return 404; # managed by Certbot




}