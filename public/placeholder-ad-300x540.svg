<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 540" width="300" height="540" role="img" aria-label="Advertisement placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#eef0f3"/>
      <stop offset="100%" stop-color="#dfe3e8"/>
    </linearGradient>
    <pattern id="dots" width="14" height="14" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#000" fill-opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="300" height="540" fill="url(#bg)"/>
  <rect width="300" height="540" fill="url(#dots)"/>
  <g transform="translate(150 230)" text-anchor="middle" font-family="ui-sans-serif, system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" fill="#5b6b86">
    <text y="0" font-size="13" font-weight="700" letter-spacing="3" fill="#6b7a93">
      ADVERTISEMENT
    </text>
    <text y="34" font-size="46" font-weight="800" fill="#2d3c58">
      300 × 540
    </text>
    <text y="64" font-size="12" fill="#6b7a93">
      placeholder
    </text>
  </g>
</svg>
