<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- background -->
  <rect width="400" height="280" rx="20" fill="#fff6d1"/>

  <!-- clouds -->
  <ellipse cx="70" cy="60" rx="34" ry="9" fill="#ffffff" opacity="0.75"/>
  <ellipse cx="320" cy="48" rx="42" ry="11" fill="#ffffff" opacity="0.75"/>
  <ellipse cx="200" cy="42" rx="28" ry="7" fill="#ffffff" opacity="0.6"/>

  <!-- flight arc 1: origin → stop -->
  <path d="M 70 198 Q 135 80 200 198" stroke="#014fd3" stroke-width="2.5" stroke-dasharray="5,5" fill="none" stroke-linecap="round"/>
  <!-- flight arc 2: stop → destination -->
  <path d="M 200 198 Q 265 80 330 198" stroke="#014fd3" stroke-width="2.5" stroke-dasharray="5,5" fill="none" stroke-linecap="round"/>

  <!-- airplane 1 (leg 1) -->
  <g transform="translate(120 116) rotate(-32)">
    <path d="M -16 0 L 14 -3 L 24 0 L 14 3 Z" fill="#014fd3"/>
    <path d="M -8 0 L -16 -10 L -12 -10 L -2 -2 Z" fill="#092d74"/>
    <path d="M -8 0 L -16 10 L -12 10 L -2 2 Z" fill="#092d74"/>
    <path d="M 8 0 L 4 -6 L 6 -6 L 12 -1 Z" fill="#092d74"/>
    <path d="M 8 0 L 4 6 L 6 6 L 12 1 Z" fill="#092d74"/>
  </g>
  <!-- airplane 2 (leg 2) -->
  <g transform="translate(250 116) rotate(-32)">
    <path d="M -16 0 L 14 -3 L 24 0 L 14 3 Z" fill="#014fd3"/>
    <path d="M -8 0 L -16 -10 L -12 -10 L -2 -2 Z" fill="#092d74"/>
    <path d="M -8 0 L -16 10 L -12 10 L -2 2 Z" fill="#092d74"/>
    <path d="M 8 0 L 4 -6 L 6 -6 L 12 -1 Z" fill="#092d74"/>
    <path d="M 8 0 L 4 6 L 6 6 L 12 1 Z" fill="#092d74"/>
  </g>

  <!-- ground line -->
  <line x1="20" y1="232" x2="380" y2="232" stroke="#014fd3" stroke-width="1.5" stroke-dasharray="2,5" opacity="0.4"/>

  <!-- origin pin -->
  <circle cx="70" cy="198" r="15" fill="#014fd3"/>
  <circle cx="70" cy="198" r="7" fill="#ffffff"/>

  <!-- stop pin (highlighted, larger) -->
  <circle cx="200" cy="198" r="22" fill="#092d74"/>
  <circle cx="200" cy="198" r="14" fill="#ffe200"/>
  <!-- clock hands on stop -->
  <line x1="200" y1="198" x2="200" y2="190" stroke="#092d74" stroke-width="2" stroke-linecap="round"/>
  <line x1="200" y1="198" x2="206" y2="200" stroke="#092d74" stroke-width="2" stroke-linecap="round"/>
  <circle cx="200" cy="198" r="1.5" fill="#092d74"/>

  <!-- destination pin -->
  <circle cx="330" cy="198" r="15" fill="#014fd3"/>
  <circle cx="330" cy="198" r="7" fill="#ffffff"/>

  <!-- labels -->
  <text x="70" y="258" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#092d74">A</text>
  <text x="200" y="258" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#092d74">LAYOVER</text>
  <text x="330" y="258" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#092d74">B</text>
</svg>
