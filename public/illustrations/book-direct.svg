<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- background -->
  <rect width="400" height="280" rx="20" fill="#cfe9fe"/>

  <!-- background airplane (decorative) -->
  <g transform="translate(355 50) rotate(-20) scale(0.9)" opacity="0.35">
    <path d="M -22 0 L 16 -4 L 32 0 L 16 4 Z" fill="#092d74"/>
    <path d="M -10 0 L -22 -14 L -16 -14 L -3 -3 Z" fill="#092d74"/>
    <path d="M -10 0 L -22 14 L -16 14 L -3 3 Z" fill="#092d74"/>
    <path d="M 10 0 L 4 -8 L 8 -8 L 16 -2 Z" fill="#092d74"/>
    <path d="M 10 0 L 4 8 L 8 8 L 16 2 Z" fill="#092d74"/>
  </g>

  <!-- browser window shadow -->
  <rect x="56" y="56" width="288" height="184" rx="10" fill="#092d74" opacity="0.12"/>
  <!-- browser window -->
  <rect x="52" y="52" width="288" height="184" rx="10" fill="#ffffff"/>
  <!-- browser chrome bar -->
  <path d="M 52 62 a 10 10 0 0 1 10 -10 h 268 a 10 10 0 0 1 10 10 v 18 H 52 z" fill="#f0f2f4"/>
  <line x1="52" y1="80" x2="340" y2="80" stroke="#092d74" stroke-width="0.5" opacity="0.25"/>

  <!-- traffic-light dots -->
  <circle cx="66" cy="66" r="3.5" fill="#ef4c62"/>
  <circle cx="78" cy="66" r="3.5" fill="#ffce00"/>
  <circle cx="90" cy="66" r="3.5" fill="#03721e"/>

  <!-- url bar -->
  <rect x="110" y="60" width="220" height="14" rx="3" fill="#ffffff" stroke="#092d74" stroke-width="0.5" opacity="0.7"/>
  <circle cx="118" cy="67" r="2.5" fill="#03721e"/>
  <text x="126" y="70" font-family="Inter, system-ui, sans-serif" font-size="8" fill="#092d74" opacity="0.75">airline.com/book</text>

  <!-- airline header bar -->
  <rect x="68" y="96" width="256" height="34" rx="6" fill="#014fd3"/>
  <text x="80" y="118" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#ffffff">YOUR AIRLINE</text>
  <circle cx="304" cy="113" r="9" fill="#ffe200"/>
  <path d="M 299 113 l 4 4 l 6 -7" stroke="#092d74" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- ticket card -->
  <rect x="68" y="140" width="148" height="64" rx="6" fill="#f0f2f4"/>
  <text x="78" y="158" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74" opacity="0.7">FLIGHT</text>
  <text x="78" y="178" font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="800" fill="#092d74">LON → NYC</text>
  <text x="78" y="196" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="800" fill="#014fd3">$299</text>

  <!-- small plane inside ticket -->
  <g transform="translate(196 158) rotate(20) scale(0.7)">
    <path d="M -14 0 L 12 -3 L 22 0 L 12 3 Z" fill="#014fd3"/>
    <path d="M -6 0 L -14 -8 L -10 -8 L 0 -1 Z" fill="#092d74"/>
    <path d="M -6 0 L -14 8 L -10 8 L 0 1 Z" fill="#092d74"/>
  </g>

  <!-- BOOK button -->
  <rect x="226" y="148" width="98" height="46" rx="6" fill="#092d74"/>
  <text x="275" y="177" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#ffe200">BOOK</text>

  <!-- cursor on button -->
  <g transform="translate(294 184)">
    <path d="M 0 0 L 0 18 L 5 13 L 9 21 L 12 19 L 8 12 L 14 12 Z" fill="#092d74" stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- footer accent line -->
  <line x1="68" y1="216" x2="324" y2="216" stroke="#092d74" stroke-width="0.5" opacity="0.2"/>
  <circle cx="76" cy="225" r="2" fill="#014fd3"/>
  <circle cx="86" cy="225" r="2" fill="#014fd3" opacity="0.5"/>
  <circle cx="96" cy="225" r="2" fill="#014fd3" opacity="0.3"/>
</svg>
