  <text x="252" y="124" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">6</text>
  <rect x="276" y="110" width="28" height="22" rx="3" fill="#f0f2f4"/>
  <text x="290" y="124" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">7</text>

  <!-- Row 2 -->
