  <text x="62"  y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">8</text>
  <rect x="86"  y="136" width="28" height="22" rx="3" fill="#f0f2f4"/>
  <text x="100" y="150" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">9</text>
