  <rect x="276" y="188" width="28" height="22" rx="3" fill="#f0f2f4"/>
  <text x="290" y="202" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">28</text>

  <!-- Row 5 (partial) -->
  <rect x="48"  y="214" width="28" height="22" rx="3" fill="#f0f2f4"/>
  <text x="62"  y="228" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">29</text>
  <rect x="86"  y="214" width="28" height="22" rx="3" fill="#f0f2f4"/>
  <text x="100" y="228" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">30</text>

  <!-- magnifying glass over the cheapest day -->
  <g transform="translate(154 152)">
    <circle r="16" cx="0" cy="0" fill="none" stroke="#092d74" stroke-width="3"/>
    <circle r="13" cx="0" cy="0" fill="none" stroke="#ffffff" stroke-width="1.5"/>
    <line x1="11" y1="11" x2="22" y2="22" stroke="#092d74" stroke-width="4" stroke-linecap="round"/>
  </g>
