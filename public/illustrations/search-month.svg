  <text x="62"  y="202" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">22</text>
  <rect x="86"  y="188" width="28" height="22" rx="3" fill="#cfe9fe"/>
  <text x="100" y="202" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#014fd3">23</text>
  <rect x="124" y="188" width="28" height="22" rx="3" fill="#f0f2f4"/>
  <text x="138" y="202" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">24</text>
  <rect x="162" y="188" width="28" height="22" rx="3" fill="#f0f2f4"/>
  <text x="176" y="202" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">25</text>
  <rect x="200" y="188" width="28" height="22" rx="3" fill="#f0f2f4"/>
  <text x="214" y="202" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">26</text>
