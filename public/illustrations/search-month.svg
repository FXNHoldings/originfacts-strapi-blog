  <text x="100" y="176" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">16</text>
  <!-- cheapest day -->
  <rect x="124" y="162" width="28" height="22" rx="3" fill="#ffe200"/>
  <text x="138" y="170" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="800" fill="#092d74">17</text>
  <text x="138" y="180" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="7" font-weight="800" fill="#092d74">$98</text>
