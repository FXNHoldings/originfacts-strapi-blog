  <text x="176" y="176" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#014fd3">18</text>
  <rect x="200" y="162" width="28" height="22" rx="3" fill="#f0f2f4"/>
  <text x="214" y="176" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">19</text>
  <rect x="238" y="162" width="28" height="22" rx="3" fill="#f0f2f4"/>
  <text x="252" y="176" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">20</text>
  <rect x="276" y="162" width="28" height="22" rx="3" fill="#f0f2f4"/>
  <text x="290" y="176" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">21</text>

  <!-- Row 4 -->
