<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- background -->
  <rect width="400" height="280" rx="20" fill="#fff6d1"/>

  <!-- calendar card shadow -->
  <rect x="44" y="48" width="312" height="208" rx="12" fill="#092d74" opacity="0.10"/>
  <!-- calendar card -->
  <rect x="40" y="44" width="312" height="208" rx="12" fill="#ffffff"/>

  <!-- month header bar -->
  <path d="M 40 56 a 12 12 0 0 1 12 -12 h 288 a 12 12 0 0 1 12 12 v 28 H 40 z" fill="#014fd3"/>
  <text x="196" y="76" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#ffffff">JUNE · CHEAPEST MONTH VIEW</text>

  <!-- day-of-week labels -->
  <g font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74" opacity="0.75">
    <text x="62"  y="102" text-anchor="middle">M</text>
    <text x="100" y="102" text-anchor="middle">T</text>
    <text x="138" y="102" text-anchor="middle">W</text>
    <text x="176" y="102" text-anchor="middle">T</text>
    <text x="214" y="102" text-anchor="middle">F</text>
    <text x="252" y="102" text-anchor="middle">S</text>
    <text x="290" y="102" text-anchor="middle">S</text>
  </g>

  <!-- grid cells: 5 weeks × 7 cols, each cell 32×26 with day + tiny price -->
  <!-- generic cell background path: rounded rect -->

  <!-- Row 1 -->
  <rect x="48"  y="110" width="28" height="22" rx="3" fill="#f0f2f4"/>
  <text x="62"  y="124" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">1</text>
  <rect x="86"  y="110" width="28" height="22" rx="3" fill="#f0f2f4"/>
  <text x="100" y="124" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">2</text>
  <rect x="124" y="110" width="28" height="22" rx="3" fill="#f0f2f4"/>
  <text x="138" y="124" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">3</text>
  <rect x="162" y="110" width="28" height="22" rx="3" fill="#f0f2f4"/>
  <text x="176" y="124" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="700" fill="#092d74">4</text>
  <rect x="200" y="110" width="28" height="22" rx="3" fill="#f0f2f4"/>
