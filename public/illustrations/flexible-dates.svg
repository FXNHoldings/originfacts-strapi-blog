<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 280" fill="none">
  <!-- background -->
  <rect width="400" height="280" rx="20" fill="#cfe9fe"/>

  <!-- background airplane (decorative, top right) -->
  <g transform="translate(345 48) rotate(-22) scale(0.9)" opacity="0.35">
    <path d="M -22 0 L 16 -4 L 32 0 L 16 4 Z" fill="#092d74"/>
    <path d="M -10 0 L -22 -14 L -16 -14 L -3 -3 Z" fill="#092d74"/>
    <path d="M -10 0 L -22 14 L -16 14 L -3 3 Z" fill="#092d74"/>
    <path d="M 10 0 L 4 -8 L 8 -8 L 16 -2 Z" fill="#092d74"/>
    <path d="M 10 0 L 4 8 L 8 8 L 16 2 Z" fill="#092d74"/>
  </g>

  <!-- highlight halo behind cheapest two days -->
  <rect x="139" y="120" width="84" height="116" rx="10" fill="#ffe200" opacity="0.55"/>

  <!-- calendar card -->
  <rect x="32" y="60" width="336" height="178" rx="10" fill="#ffffff"/>
  <!-- card header bar -->
  <path d="M 32 70 a 10 10 0 0 1 10 -10 h 316 a 10 10 0 0 1 10 10 v 28 H 32 z" fill="#014fd3"/>
  <text x="200" y="89" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="800" fill="#ffffff">PICK YOUR DAY · LON → NYC</text>

  <!-- 7 day columns -->
  <!-- M -->
  <text x="56" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#092d74">MON</text>
  <text x="56" y="148" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#092d74">$220</text>
  <!-- T -->
  <text x="98" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#092d74">TUE</text>
  <text x="98" y="148" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#092d74">$185</text>
  <!-- W (cheap) -->
  <text x="160" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#092d74">WED</text>
  <text x="160" y="148" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#014fd3">$98</text>
  <text x="160" y="166" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="800" fill="#092d74">CHEAPEST</text>
  <!-- T (cheap) -->
  <text x="202" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#092d74">THU</text>
  <text x="202" y="148" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="800" fill="#014fd3">$115</text>
  <text x="202" y="166" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="8" font-weight="800" fill="#092d74">CHEAP</text>
  <!-- F -->
  <text x="248" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#092d74">FRI</text>
  <text x="248" y="148" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#092d74">$295</text>
  <!-- S -->
  <text x="290" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#092d74">SAT</text>
  <text x="290" y="148" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#092d74">$340</text>
  <!-- S -->
  <text x="338" y="120" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#092d74">SUN</text>
  <text x="338" y="148" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="700" fill="#092d74">$310</text>

  <!-- separator -->
  <line x1="44" y1="186" x2="356" y2="186" stroke="#092d74" stroke-width="0.5" opacity="0.2"/>

  <!-- shift arrows -->
  <g stroke="#014fd3" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 130 212 L 110 212"/>
    <path d="M 110 212 L 118 207"/>
    <path d="M 110 212 L 118 217"/>
    <path d="M 240 212 L 260 212"/>
    <path d="M 260 212 L 252 207"/>
    <path d="M 260 212 L 252 217"/>
  </g>
  <text x="185" y="216" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="800" fill="#092d74">SHIFT YOUR DATES</text>
</svg>
